<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行計画アプリ プロトタイプ</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* スマホサイズのモックアップ容器 */
        .phone-mock {
            width: 375px;
            height: 667px;
            background: var(--card-color);
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 8px solid #333;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: #444;
        }

        /* 共通の入力欄とボタン */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        /* ① ログイン画面の装飾 */
        #screen-login {
            justify-content: center;
        }

        /* ② グループ選択画面の装飾 */
        .group-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .group-item {
            background: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .group-item:hover {
            transform: scale(0.98);
        }

        .btn-plus {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            line-height: 50px;
            margin: 0 auto 20px auto;
            display: block;
        }

        /* モーダル（ポップアップ風） */
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 80%;
        }

        /* ③ メイン画面の装飾 */
        .main-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #666;
        }

        .tab-bar {
            display: flex;
            border-top: 1px solid #ddd;
            margin: 0 -20px -20px -20px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            background: #f9f9f9;
            font-size: 14px;
        }

        .tab-item.active {
            background: #fff;
            font-weight: bold;
            color: var(--primary-color);
            border-top: 3px solid var(--primary-color);
        }
    </style>
</head>
<body>

<div class="phone-mock">

    <div id="screen-login" class="screen active">
        <h2>ログイン</h2>
        <input type="text" placeholder="メールアドレス">
        <input type="password" placeholder="パスワード">
        <button onclick="navigateTo('screen-group')">ログイン</button>
    </div>

    <div id="screen-group" class="screen">
        <h2>グループ選択</h2>
        <div class="group-list" id="group-container">
            <div class="group-item" onclick="openGroup('卒業旅行')">卒業旅行（4人）</div>
            <div class="group-item" onclick="openGroup('週末キャンプ')">週末キャンプ（3人）</div>
        </div>
        <button class="btn-plus" onclick="toggleModal(true)">+</button>
    </div>

    <div id="group-modal" class="modal">
        <div class="modal-content">
            <h3>グループ作成</h3>
            <input type="text" id="new-group-name" placeholder="グループ名を入力">
            <button onclick="copyInviteURL()">メンバーを招待 (URLコピー)</button>
            <button onclick="createGroup()" style="background-color: #2ecc71;">作成する</button>
            <button onclick="toggleModal(false)" style="background-color: #95a5a6; margin-top: 5px;">キャンセル</button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <div class="main-header">
            <h3 id="current-group-title">グループ名</h3>
            <span style="color: var(--primary-color); cursor:pointer; font-size:12px;" onclick="navigateTo('screen-group')">← 戻る</span>
        </div>
        
        <div class="main-content" id="main-content-area">
            「しおり」の画面です
        </div>

        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('しおり', this)">しおり</div>
            <div class="tab-item" onclick="switchTab('行き先', this)">行き先</div>
            <div class="tab-item" onclick="switchTab('お金', this)">お金</div>
        </div>
    </div>

</div>

<script>
    // 画面遷移の切り替え関数
    function navigateTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // モーダルの開閉
    function toggleModal(show) {
        const modal = document.getElementById('group-modal');
        if (show) modal.classList.add('active');
        else modal.classList.remove('active');
    }

    // メンバー招待のシミュレーション
    function copyInviteURL() {
        alert("招待URLをクリップボードにコピーしました！\n友達に送ってシェアしましょう。");
    }

    // グループ作成処理
    function createGroup() {
        const nameInput = document.getElementById('new-group-name');
        const groupName = nameInput.value.trim();
        
        if (!groupName) {
            alert("グループ名を入力してください");
            return;
        }

        // リストに追加
        const container = document.getElementById('group-container');
        const newGroup = document.createElement('div');
        newGroup.className = 'group-item';
        newGroup.innerText = `${groupName}（1人）`;
        newGroup.onclick = function() { openGroup(groupName); };
        
        container.appendChild(newGroup);
        
        // リセットして閉じる
        nameInput.value = '';
        toggleModal(false);
    }

    // グループをタップしてメイン画面へ移動
    function openGroup(name) {
        document.getElementById('current-group-title').innerText = name;
        switchTab('しおり', document.querySelector('.tab-item')); // 初期タブを「しおり」に
        navigateTo('screen-main');
    }

    // タブの切り替え
    function switchTab(tabName, element) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        
        document.getElementById('main-content-area').innerText = `「${tabName}」の画面です`;
    }
</script>

</body>
</html>
