<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム旅行計画アプリ</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #ffffff;
            --card-color: #ffffff;
            --text-color: #333333;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .phone-mock {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: var(--card-color);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        @media (min-width: 501px) {
            .phone-mock {
                box-shadow: 0 0 20px rgba(0,0,0,0.05);
            }
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: #444;
        }

        input[type="text"], input[type="password"], input[type="time"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        #screen-login { justify-content: center; }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .group-header h2 { margin: 0; font-size: 20px; }
        .user-status { font-size: 11px; color: #666; margin-bottom: 5px; text-align: right; }
        .btn-logout {
            background: none; color: var(--danger-color); border: 1px solid var(--danger-color);
            padding: 4px 8px; font-size: 12px; border-radius: 4px; width: auto; margin: 0;
        }
        .btn-logout:hover { background: #fdf2f2; }

        .group-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
            font-weight: bold;
        }

        .guide-card {
            text-align: center;
            background: #f8f9fa;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 30px 20px;
            margin-top: 20px;
            color: #64748b;
        }
        .guide-icon {
            font-size: 42px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .guide-title {
            font-weight: bold;
            font-size: 16px;
            color: #334155;
            margin-bottom: 8px;
        }
        .guide-desc {
            font-size: 13px;
            line-height: 1.6;
            margin: 0;
        }

        .btn-fab {
            position: absolute;
            right: 20px;
            bottom: 80px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 28px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            z-index: 5;
        }

        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            box-sizing: border-box;
            max-height: 80%;
            overflow-y: auto;
        }

        .main-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
        }
        
        .title-container {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .title-container h3 { margin: 0; font-size: 18px; }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-top: 10px;
            position: relative;
        }

        .tab-bar {
            display: flex;
            border-top: 1px solid #ddd;
            margin: 0 -20px -20px -20px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            background: #f9f9f9;
            font-size: 14px;
        }

        .tab-item.active {
            background: #fff;
            font-weight: bold;
            color: var(--primary-color);
            border-top: 3px solid var(--primary-color);
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            position: relative;
            border-left: 4px solid var(--primary-color);
        }

        .item-data { flex: 1; font-size: 14px; word-break: break-all; }
        .item-time { font-weight: bold; color: var(--primary-color); margin-right: 10px; }
        
        .menu-container { position: relative; }
        .btn-menu {
            background: none; color: #999; border: none; padding: 0 5px;
            font-size: 20px; cursor: pointer; width: auto; margin: 0;
        }
        
        .dropdown-menu {
            display: none; position: absolute; right: 0; top: 25px;
            background: white; border: 1px solid #ddd; border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 20; width: 80px;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu div {
            padding: 8px; font-size: 12px; text-align: center; cursor: pointer;
        }
        .dropdown-menu div:hover { background: #f5f5f5; }
        .dropdown-menu .menu-delete { color: var(--danger-color); }

        #settlement-area {
            background: #e8f4fd; padding: 12px; border-radius: 8px;
            margin-bottom: 12px; font-size: 13px;
        }

        .member-tag-list {
            display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0;
        }
        .member-tag {
            background: #eef2f7; padding: 4px 10px; border-radius: 20px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
        }
        .member-tag .btn-del-member {
            background: none; border: none; color: var(--danger-color); cursor: pointer; font-weight: bold; padding: 0;
        }

        .loading-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.8); display: none;
            justify-content: center; align-items: center; font-weight: bold; z-index: 100;
        }
        .loading-overlay.active { display: flex; }
    </style>
</head>
<body>

<div class="phone-mock">
    <div id="loading" class="loading-overlay">通信中...</div>

    <div id="screen-login" class="screen active">
        <h2>ログイン</h2>
        <input type="text" id="input-login-name" placeholder="あなたの名前（アプリ内で表示）">
        <button onclick="handleLogin()">ログインして始める</button>
    </div>

    <div id="screen-group" class="screen">
        <div class="group-header">
            <h2>グループ選択</h2>
            <div style="text-align: right;">
                <div class="user-status" id="txt-user-status">〇〇さん</div>
                <button class="btn-logout" onclick="handleLogout()">ログアウト</button>
            </div>
        </div>
        <div class="group-list" id="group-container"></div>
        <button class="btn-fab" onclick="toggleGroupModal(true)">+</button>
    </div>

    <div id="group-modal" class="modal">
        <div class="modal-content">
            <h3>グループ作成</h3>
            <label style="font-size:12px; color:#666;">グループ名</label>
            <input type="text" id="new-group-name" placeholder="グループ名を入力">
            
            <label style="font-size:12px; color:#666; margin-top:10px; display:block;">仮メンバー（メモ用）を追加</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="create-member-name-input" placeholder="名前を入力" style="margin:0; flex:1;">
                <button onclick="addMemberToCreate()" style="margin:0; width:auto; padding:0 15px;">追加</button>
            </div>
            <div class="member-tag-list" id="create-member-list"></div>

            <button onclick="createGroup()" style="background-color: #2ecc71; margin-top: 20px;">作成する</button>
            <button onclick="toggleGroupModal(false)" style="background-color: #95a5a6; margin-top: 5px;">キャンセル</button>
        </div>
    </div>

    <div id="group-edit-modal" class="modal">
        <div class="modal-content">
            <h3>グループ名の編集</h3>
            <input type="hidden" id="edit-group-id">
            <label style="font-size:12px; color:#666;">新しいグループ名</label>
            <input type="text" id="input-edit-group-name">
            <button onclick="saveGroupEdit()" style="background-color: #2ecc71;">変更を保存</button>
            <button onclick="closeGroupEditModal()" style="background-color: #95a5a6; margin-top: 5px;">キャンセル</button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <div class="main-header">
            <span style="color: var(--primary-color); cursor:pointer; font-size:12px; position:absolute; left:0;" onclick="goToGroupScreen()">← 戻る</span>
            <div class="title-container">
                <h3 id="current-group-title">グループ名</h3>
                <div class="menu-container">
                    <button class="btn-menu" onclick="toggleMenu(event, 'header')">⋮</button>
                    <div class="dropdown-menu" id="menu-header" style="width: 100px;">
                        <div onclick="openGroupSettingsModal()">グループ設定</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-content" id="main-content-area"></div>
        <button class="btn-fab" onclick="openItemModal()">+</button>

        <div class="tab-bar">
            <div class="tab-item active" id="tab-shiori" onclick="switchTab('しおり')">しおり</div>
            <div class="tab-item" id="tab-yukisaki" onclick="switchTab('行き先')">行き先</div>
            <div class="tab-item" id="tab-okane" onclick="switchTab('お金')">お金</div>
        </div>
    </div>

    <div id="group-settings-modal" class="modal">
        <div class="modal-content">
            <h3>グループの設定</h3>
            <label style="font-size:12px; color:#666;">グループ名の変更</label>
            <input type="text" id="edit-group-name-input">
            
            <label style="font-size:12px; color:#666; margin-top:10px; display:block;">仮メンバーの追加</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-member-name-input" placeholder="名前を入力" style="margin:0; flex:1;">
                <button onclick="addMember()" style="margin:0; width:auto; padding:0 15px;">追加</button>
            </div>
            <div class="member-tag-list" id="modal-member-list"></div>

            <button onclick="copyInviteURL()" style="background-color: #f39c12; font-size:13px; padding:8px;">LINE等で友達を招待 (URLコピー)</button>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <button onclick="saveGroupSettings()" style="background-color: #2ecc71; margin-top:0;">設定を保存する</button>
            <button onclick="closeGroupSettingsModal()" style="background-color: #95a5a6; margin-top: 5px;">閉じる</button>
        </div>
    </div>

    <div id="item-modal" class="modal">
        <div class="modal-content">
            <h3 id="item-modal-title">項目を追加・編集</h3>
            <input type="hidden" id="edit-id">
            
            <div id="form-shiori" class="modal-form">
                <label style="font-size:12px; color:#666;">時刻 (24時間表記)</label>
                <input type="time" id="input-time" value="10:00">
                <input type="text" id="input-shiori-text" placeholder="予定の内容（例: 〇〇駅集合）">
            </div>

            <div id="form-yukisaki" class="modal-form" style="display:none;">
                <input type="text" id="input-spot-name" placeholder="行きたい場所・スポット名">
                <input type="text" id="input-spot-url" placeholder="参考URL（任意）">
            </div>

            <div id="form-okane" class="modal-form" style="display:none;">
                <label style="font-size:12px; color:#666;">支払った人を選んでください</label>
                <select id="input-money-name" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; font-size:16px;"></select>
                <input type="number" id="input-money-amount" placeholder="金額（円）">
                <input type="text" id="input-money-text" placeholder="何に払ったか（例: レンタカー代）">
            </div>

            <button onclick="saveItem()" style="background-color: #2ecc71;">保存する</button>
            <button onclick="closeItemModal()" style="background-color: #95a5a6; margin-top: 5px;">キャンセル</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, query, where, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBebAut679yxNIm1q5CUjBsrbVT1c8mWKg",
        authDomain: "appsakusei-877a7.firebaseapp.com",
        projectId: "appsakusei-877a7",
        storageBucket: "appsakusei-877a7.firebasestorage.app",
        messagingSenderId: "738304206704",
        appId: "1:738304206704:web:d4ca81048b5cc9da5591b5",
        measurementId: "G-DQ44Z0DMC3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myUID = ""; 
    let loginUserName = "";
    let currentGroupId = "";
    let currentTab = "しおり"; 
    let createTempMembers = []; 
    let tempMembers = {}; 

    let groupListUnsubscribe = null;
    let activeGroupUnsubscribe = null;
    let currentGroupData = null;

    const urlParams = new URLSearchParams(window.location.search);
    const inviteGroupId = urlParams.get('join');

    // ログイン状態の監視
    onAuthStateChanged(auth, async (user) => {
        showLoading(true);
        if (user) {
            myUID = user.uid;
            const userDoc = await getDoc(doc(db, "users", myUID));
            if (userDoc.exists()) {
                loginUserName = userDoc.data().name;
                document.getElementById('txt-user-status').innerText = `${loginUserName} さん`;
                
                if (inviteGroupId) {
                    await joinGroupViaLink(inviteGroupId);
                } else {
                    goToGroupScreen();
                }
            } else {
                navigateTo('screen-login');
                showLoading(false);
            }
        } else {
            myUID = "";
            loginUserName = "";
            document.getElementById('input-login-name').value = "";
            
            if (groupListUnsubscribe) { groupListUnsubscribe(); groupListUnsubscribe = null; }
            if (activeGroupUnsubscribe) { activeGroupUnsubscribe(); activeGroupUnsubscribe = null; }
            
            navigateTo('screen-login');
            showLoading(false);
        }
    });

    function showLoading(show) {
        document.getElementById('loading').classList.toggle('active', show);
    }

    async function handleLogin() {
        const nameInput = document.getElementById('input-login-name').value.trim();
        if (!nameInput) return alert("名前を入力してください");
        showLoading(true);

        const dummyEmail = encodeURIComponent(nameInput) + "@travel-app.dummy";
        const dummyPassword = "fixedPassword123_Secure!";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, dummyEmail, dummyPassword);
            myUID = userCredential.user.uid;
            loginUserName = nameInput;

            if (inviteGroupId) {
                await joinGroupViaLink(inviteGroupId);
            } else {
                goToGroupScreen();
            }
        } catch (loginError) {
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, dummyEmail, dummyPassword);
                myUID = userCredential.user.uid;
                loginUserName = nameInput;

                await setDoc(doc(db, "users", myUID), { 
                    name: loginUserName,
                    email: dummyEmail
                });

                if (inviteGroupId) {
                    await joinGroupViaLink(inviteGroupId);
                } else {
                    goToGroupScreen();
                }
            } catch (createError) {
                alert("ログインに失敗しました");
                showLoading(false);
            }
        }
    }

    async function handleLogout() {
        if (!confirm("ログアウトしますか？")) return;
        showLoading(true);
        try {
            await signOut(auth);
        } catch (e) {
            alert("ログアウトに失敗しました");
            showLoading(false);
        }
    }

    async function joinGroupViaLink(groupId) {
        try {
            const groupRef = doc(db, "groups", groupId);
            const groupSnap = await getDoc(groupRef);
            if (groupSnap.exists()) {
                const updates = { members: arrayUnion(myUID) };
                updates[`memberNames.${myUID}`] = loginUserName;
                await updateDoc(groupRef, updates);

                window.history.replaceState({}, document.title, window.location.pathname);
                currentGroupId = groupId;
                openGroup(groupId, groupSnap.data().name);
            } else {
                alert("指定された旅行グループは存在しません");
                goToGroupScreen();
            }
        } catch (e) {
            alert("グループへの参加に失敗しました");
            goToGroupScreen();
        }
    }

    function navigateTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        closeAllMenus();
    }

    function goToGroupScreen() {
        navigateTo('screen-group');
        syncGroupList();
    }

    function syncGroupList() {
        if (groupListUnsubscribe) groupListUnsubscribe();
        showLoading(true);

        const q = query(collection(db, "groups"), where("members", "array-contains", myUID));
        groupListUnsubscribe = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('group-container');
            container.innerHTML = '';
            
            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="guide-card">
                        <div class="guide-icon">✈️</div>
                        <div class="guide-title">旅の計画をはじめよう！</div>
                        <p class="guide-desc">右下の<strong>「＋」ボタン</strong>から、新しい旅行グループを作ってみましょう！友達にURLを送れば一緒に編集できます。</p>
                    </div>`;
                showLoading(false);
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const gid = docSnap.id;
                const memberCount = Object.keys(data.memberNames || {}).length;
                
                const div = document.createElement('div');
                div.className = 'group-item';
                
                div.innerHTML = `
                    <div style="flex:1; cursor:pointer; padding-right:10px; word-break:break-all;" onclick="openGroup('${gid}', '${data.name}')">
                        ${data.name}（${memberCount}人）
                    </div>
                    <div class="menu-container">
                        <button class="btn-menu" onclick="toggleMenu(event, '${gid}')">⋮</button>
                        <div class="dropdown-menu" id="menu-${gid}">
                            <div onclick="openGroupEditModal('${gid}', '${data.name}')">編集</div>
                            <div class="menu-delete" onclick="deleteGroup('${gid}')">削除</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            showLoading(false);
        });
    }

    function toggleGroupModal(show) {
        const modal = document.getElementById('group-modal');
        if (show) {
            document.getElementById('new-group-name').value = '';
            document.getElementById('create-member-name-input').value = '';
            createTempMembers = [{ id: myUID, name: loginUserName }]; 
            renderCreateMembers();
            modal.classList.add('active');
        } else {
            modal.classList.remove('active');
        }
    }

    function renderCreateMembers() {
        const listContainer = document.getElementById('create-member-list');
        listContainer.innerHTML = '';
        createTempMembers.forEach((m, index) => {
            const tag = document.createElement('div');
            tag.className = 'member-tag';
            const deleteBtn = m.id === myUID ? '' : ` <button class="btn-del-member" onclick="removeMemberFromCreate(${index})">×</button>`;
            tag.innerHTML = `${m.name}${deleteBtn}`;
            listContainer.appendChild(tag);
        });
    }

    function addMemberToCreate() {
        const input = document.getElementById('create-member-name-input');
        const name = input.value.trim();
        if(!name) return;
        const dummyId = "dummy_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4);
        createTempMembers.push({ id: dummyId, name: name });
        input.value = '';
        renderCreateMembers();
    }

    function removeMemberFromCreate(index) {
        createTempMembers.splice(index, 1);
        renderCreateMembers();
    }

    async function createGroup() {
        const nameInput = document.getElementById('new-group-name');
        const groupName = nameInput.value.trim();
        if (!groupName) return alert("グループ名を入力してください");

        showLoading(true);
        const newGroupRef = doc(collection(db, "groups"));
        
        const membersArray = [];
        const memberNamesMap = {};
        createTempMembers.forEach(m => {
            membersArray.push(m.id);
            memberNamesMap[m.id] = m.name;
        });

        await setDoc(newGroupRef, {
            name: groupName,
            members: membersArray,
            memberNames: memberNamesMap,
            shiori: [],
            yukisaki: [],
            okane: []
        });

        toggleGroupModal(false);
        openGroup(newGroupRef.id, groupName);
    }

    function openGroup(groupId, groupName) {
        currentGroupId = groupId;
        document.getElementById('current-group-title').innerText = groupName;
        navigateTo('screen-main');

        if (activeGroupUnsubscribe) activeGroupUnsubscribe();

        activeGroupUnsubscribe = onSnapshot(doc(db, "groups", groupId), (docSnap) => {
            if (!docSnap.exists()) return;
            currentGroupData = docSnap.data();
            renderContent();
        });
    }

    function openGroupEditModal(groupId, currentName) {
        closeAllMenus();
        document.getElementById('edit-group-id').value = groupId;
        document.getElementById('input-edit-group-name').value = currentName;
        document.getElementById('group-edit-modal').classList.add('active');
    }

    function closeGroupEditModal() {
        document.getElementById('group-edit-modal').classList.remove('active');
    }

    async function saveGroupEdit() {
        const gid = document.getElementById('edit-group-id').value;
        const newName = document.getElementById('input-edit-group-name').value.trim();
        if(!newName) return alert("グループ名を入力してください");
        
        showLoading(true);
        await updateDoc(doc(db, "groups", gid), { name: newName });
        closeGroupEditModal();
        showLoading(false);
    }

    async function deleteGroup(groupId) {
        closeAllMenus();
        if(!confirm("本当にこのグループを削除しますか？\n内包されているしおりや支出データもすべて消去されます。")) return;
        
        showLoading(true);
        try {
            await deleteDoc(doc(db, "groups", groupId));
        } catch(e) {
            alert("グループの削除に失敗しました");
        }
        showLoading(false);
    }

    function openGroupSettingsModal() {
        closeAllMenus();
        document.getElementById('edit-group-name-input').value = currentGroupData.name;
        tempMembers = { ...currentGroupData.memberNames };
        renderModalMembers();
        document.getElementById('group-settings-modal').classList.add('active');
    }

    function closeGroupSettingsModal() {
        document.getElementById('group-settings-modal').classList.remove('active');
    }

    function renderModalMembers() {
        const listContainer = document.getElementById('modal-member-list');
        listContainer.innerHTML = '';
        Object.keys(tempMembers).forEach((id) => {
            const tag = document.createElement('div');
            tag.className = 'member-tag';
            const isMe = id === myUID;
            const deleteBtn = isMe ? '' : ` <button class="btn-del-member" onclick="removeTempMember('${id}')">×</button>`;
            tag.innerHTML = `${tempMembers[id]}${deleteBtn}`;
            listContainer.appendChild(tag);
        });
    }

    function addMember() {
        const input = document.getElementById('new-member-name-input');
        const name = input.value.trim();
        if(!name) return;
        const dummyId = "dummy_" + Date.now();
        tempMembers[dummyId] = name;
        input.value = '';
        renderModalMembers();
    }

    function removeTempMember(id) {
        delete tempMembers[id];
        renderModalMembers();
    }

    function copyInviteURL() {
        const inviteURL = `${window.location.origin}${window.location.pathname}?join=${currentGroupId}`;
        navigator.clipboard.writeText(inviteURL).then(() => {
            alert("招待URLをコピーしました！\nLINEやインスタで友達に送ると、このグループに直接参加してもらえます。");
        }).catch(() => {
            alert("URLのコピーに失敗しました: " + inviteURL);
        });
    }

    async function saveGroupSettings() {
        const newName = document.getElementById('edit-group-name-input').value.trim();
        if(!newName) return alert("グループ名を入力してください");

        showLoading(true);
        const groupRef = doc(db, "groups", currentGroupId);
        const membersArray = Object.keys(tempMembers);

        await updateDoc(groupRef, {
            name: newName,
            members: membersArray,
            memberNames: tempMembers
        });

        document.getElementById('current-group-title').innerText = newName;
        closeGroupSettingsModal();
        showLoading(false);
    }

    function switchTab(tabName) {
        currentTab = tabName;
        closeAllMenus();
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        if(tabName === 'しおり') document.getElementById('tab-shiori').classList.add('active');
        if(tabName === '行き先') document.getElementById('tab-yukisaki').classList.add('active');
        if(tabName === 'お金') document.getElementById('tab-okane').classList.add('active');
        renderContent();
    }

    function renderContent() {
        const container = document.getElementById('main-content-area');
        container.innerHTML = "";
        if (!currentGroupData) return;

        if (currentTab === 'しおり') {
            const shioriList = [...(currentGroupData.shiori || [])];
            shioriList.sort((a, b) => a.time.localeCompare(b.time));
            shioriList.forEach(item => {
                container.appendChild(createListItemHTML(item.id, `
                    <span class="item-time">${item.time}</span>
                    <span>${item.text}</span>
                `));
            });
        } 
        else if (currentTab === '行き先') {
            const yukisakiList = currentGroupData.yukisaki || [];
            yukisakiList.forEach(item => {
                let urlLink = item.url ? `<br><a href="${item.url}" target="_blank" style="font-size:12px; color:var(--primary-color);">${item.url}</a>` : '';
                container.appendChild(createListItemHTML(item.id, `<strong>${item.name}</strong>${urlLink}`));
            });
        } 
        else if (currentTab === 'お金') {
            let total = 0;
            let memberMap = {}; 
            const memberIds = Object.keys(currentGroupData.memberNames || {});
            const okaneList = currentGroupData.okane || [];
            
            memberIds.forEach(id => memberMap[id] = 0);
            okaneList.forEach(e => {
                total += e.amount;
                if (memberMap[e.uid] !== undefined) memberMap[e.uid] += e.amount;
            });
            
            let settlementHTML = '';
            const totalMembers = memberIds.length;

            if (totalMembers > 0) {
                const perPerson = Math.round(total / totalMembers);
                settlementHTML = `
                    <div id="settlement-area">
                        <strong>合計支出:</strong> ${total.toLocaleString()}円 / <strong>1人あたり:</strong> ${perPerson.toLocaleString()}円<br>
                        <table style="width:100%; margin-top:5px; font-size:12px; border-top:1px solid #ccc;">
                `;
                memberIds.forEach(id => {
                    const name = currentGroupData.memberNames[id] || "不明なユーザー";
                    const diff = memberMap[id] - perPerson;
                    let diffText = diff >= 0 ? `<span style="color:#2ecc71;">+${diff.toLocaleString()}円 (貰う)</span>` : `<span style="color:#e74c3c;">${diff.toLocaleString()}円 (払う)</span>`;
                    settlementHTML += `<tr><td>${name}</td><td style="text-align:right;">${diffText}</td></tr>`;
                });
                settlementHTML += `</table></div>`;
            }

            container.innerHTML = settlementHTML;

            okaneList.forEach(item => {
                const payerName = currentGroupData.memberNames[item.uid] || "不明なユーザー";
                container.appendChild(createListItemHTML(item.id, `
                    <strong>${payerName}</strong> が <strong>${item.amount.toLocaleString()}円</strong> 支払った<br>
                    <span style="font-size:12px; color:#666;">（${item.text}）</span>
                `));
            });
        }
    }

    function createListItemHTML(id, innerContentHTML) {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
            <div class="item-data">${innerContentHTML}</div>
            <div class="menu-container">
                <button class="btn-menu" onclick="toggleMenu(event, '${id}')">⋮</button>
                <div class="dropdown-menu" id="menu-${id}">
                    <div onclick="openEditItem('${id}')">編集</div>
                    <div class="menu-delete" onclick="deleteItem('${id}')">削除</div>
                </div>
            </div>
        `;
        return div;
    }

    function toggleMenu(event, id) {
        event.stopPropagation();
        const targetMenu = document.getElementById(`menu-${id}`);
        const isAlreadyOpen = targetMenu.classList.contains('show');
        closeAllMenus();
        if (!isAlreadyOpen) targetMenu.classList.add('show');
    }

    function closeAllMenus() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
    }
    document.addEventListener('click', closeAllMenus);

    function openItemModal() {
        document.getElementById('edit-id').value = ''; 
        document.getElementById('item-modal-title').innerText = `${currentTab}の追加`;
        
        document.getElementById('form-shiori').style.display = currentTab === 'しおり' ? 'block' : 'none';
        document.getElementById('form-yukisaki').style.display = currentTab === '行き先' ? 'block' : 'none';
        document.getElementById('form-okane').style.display = currentTab === 'お金' ? 'block' : 'none';

        if(currentTab === 'しおり') { document.getElementById('input-shiori-text').value = ''; }
        if(currentTab === '行き先') { document.getElementById('input-spot-name').value = ''; document.getElementById('input-spot-url').value = ''; }
        
        if(currentTab === 'お金') { 
            const select = document.getElementById('input-money-name');
            select.innerHTML = '';
            const namesMap = currentGroupData.memberNames || {};
            Object.keys(namesMap).forEach(uid => {
                const opt = document.createElement('option');
                opt.value = uid; opt.innerText = namesMap[uid];
                select.appendChild(opt);
            });
            document.getElementById('input-money-amount').value = ''; 
            document.getElementById('input-money-text').value = ''; 
        }

        document.getElementById('item-modal').classList.add('active');
    }

    function closeItemModal() {
        document.getElementById('item-modal').classList.remove('active');
    }

    function openEditItem(id) {
        openItemModal();
        document.getElementById('edit-id').value = id;
        document.getElementById('item-modal-title').innerText = `${currentTab}の編集`;

        if (currentTab === 'しおり') {
            const item = currentGroupData.shiori.find(i => i.id === id);
            document.getElementById('input-time').value = item.time;
            document.getElementById('input-shiori-text').value = item.text;
        } 
        else if (currentTab === '行き先') {
            const item = currentGroupData.yukisaki.find(i => i.id === id);
            document.getElementById('input-spot-name').value = item.name;
            document.getElementById('input-spot-url').value = item.url;
        } 
        else if (currentTab === 'お金') {
            const item = currentGroupData.okane.find(i => i.id === id);
            document.getElementById('input-money-name').value = item.uid;
            document.getElementById('input-money-amount').value = item.amount;
            document.getElementById('input-money-text').value = item.text;
        }
    }

    async function saveItem() {
        const idInput = document.getElementById('edit-id').value;
        const isEdit = idInput !== '';
        const itemId = isEdit ? idInput : "item_" + Date.now(); 
        
        showLoading(true);
        const groupRef = doc(db, "groups", currentGroupId);

        let shioriList = [...(currentGroupData.shiori || [])];
        let yukisakiList = [...(currentGroupData.yukisaki || [])];
        let okaneList = [...(currentGroupData.okane || [])];

        if (currentTab === 'しおり') {
            const time = document.getElementById('input-time').value;
            const text = document.getElementById('input-shiori-text').value.trim();
            if(!text) return alert("内容を入力してください");

            if (isEdit) {
                const item = shioriList.find(i => i.id === itemId);
                item.time = time; item.text = text;
            } else {
                shioriList.push({ id: itemId, time: time, text: text });
            }
        } 
        else if (currentTab === '行き先') {
            const name = document.getElementById('input-spot-name').value.trim();
            const url = document.getElementById('input-spot-url').value.trim();
            if(!name) return alert("スポット名を入力してください");

            if (isEdit) {
                const item = yukisakiList.find(i => i.id === itemId);
                item.name = name; item.url = url;
            } else {
                yukisakiList.push({ id: itemId, name: name, url: url });
            }
        } 
        else if (currentTab === 'お金') {
            const uid = document.getElementById('input-money-name').value;
            const amount = parseInt(document.getElementById('input-money-amount').value);
            const text = document.getElementById('input-money-text').value.trim();
            if(!uid || isNaN(amount)) return alert("金額を正しく入力してください");

            if (isEdit) {
                const item = okaneList.find(i => i.id === itemId);
                item.uid = uid; item.amount = amount; item.text = text;
            } else {
                okaneList.push({ id: itemId, uid: uid, amount: amount, text: text });
            }
        }

        await updateDoc(groupRef, {
            shiori: shioriList,
            yukisaki: yukisakiList,
            okane: okaneList
        });

        closeItemModal();
        showLoading(false);
    }

    async function deleteItem(id) {
        if(!confirm("本当に削除しますか？")) return;
        showLoading(true);
        const groupRef = doc(db, "groups", currentGroupId);

        let shioriList = (currentGroupData.shiori || []).filter(i => i.id !== id);
        let yukisakiList = (currentGroupData.yukisaki || []).filter(i => i.id !== id);
        let okaneList = (currentGroupData.okane || []).filter(i => i.id !== id);

        await updateDoc(groupRef, {
            shiori: shioriList,
            yukisaki: yukisakiList,
            okane: okaneList
        });
        showLoading(false);
    }

    // 🌟 【超重要】すべてのローカル関数をwindowオブジェクトに登録してHTMLのonclickに公開
    window.handleLogin = handleLogin;
    window.handleLogout = handleLogout;
    window.goToGroupScreen = goToGroupScreen;
    window.toggleGroupModal = toggleGroupModal;
    window.addMemberToCreate = addMemberToCreate;
    window.removeMemberFromCreate = removeMemberFromCreate;
    window.createGroup = createGroup;
    window.openGroup = openGroup;
    window.openGroupEditModal = openGroupEditModal;
    window.closeGroupEditModal = closeGroupEditModal;
    window.saveGroupEdit = saveGroupEdit;
    window.deleteGroup = deleteGroup;
    window.openGroupSettingsModal = openGroupSettingsModal;
    window.closeGroupSettingsModal = closeGroupSettingsModal;
    window.addMember = addMember;
    window.removeTempMember = removeTempMember;
    window.copyInviteURL = copyInviteURL;
    window.saveGroupSettings = saveGroupSettings;
    window.switchTab = switchTab;
    window.toggleMenu = toggleMenu;
    window.openItemModal = openItemModal;
    window.closeItemModal = closeItemModal;
    window.openEditItem = openEditItem;
    window.saveItem = saveItem;
    window.deleteItem = deleteItem;
</script>
</body>
