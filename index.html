<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベースキャンプ - 旅のしおり</title>
  <style>
    /* --- 全体設定（リセットと共通スタイル） --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 850px;
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .hidden {
      display: none !important;
    }

    /* --- 1. ログイン画面のスタイル --- */
    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
    }
    .brand-logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 10px;
    }
    .brand-subtitle {
      color: #6b7280;
      margin-bottom: 40px;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: #4b5563;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .input-group input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      background-color: #f9fafb;
    }
    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      background-color: #fff;
    }
    .btn-primary {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background-color: #2563eb;
    }

    /* --- 2. メイン画面（しおり）のスタイル --- */
    #main-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    header {
      background-color: #3b82f6;
      color: white;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .group-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .group-name {
      font-size: 1.25rem;
      font-weight: bold;
    }
    .member-count {
      font-size: 0.85rem;
      background: rgba(255,255,255,0.2);
      padding: 4px 8px;
      border-radius: 20px;
    }
    .main-content {
      padding: 20px;
      flex: 1;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #1f2937;
    }

    /* ✨ 追加：予定入力フォームのスタイル */
    .form-card {
      background: #f3f4f6;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
    }
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .form-card input {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      width: 100%;
    }
    .form-card input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .btn-secondary {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 0.9rem;
    }
    .btn-secondary:hover {
      background-color: #059669;
    }

    /* タイムライン（しおり）の装飾 */
    .timeline {
      position: relative;
      border-left: 2px solid #e5e7eb;
      padding-left: 20px;
      margin-left: 10px;
    }
    .timeline-item {
      position: relative;
      margin-bottom: 25px;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -27px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #3b82f6;
      border: 2px solid white;
    }
    .time {
      font-size: 0.85rem;
      color: #3b82f6;
      font-weight: bold;
    }
    .plan-card {
      background: #f9fafb;
      padding: 12px;
      border-radius: 8px;
      margin-top: 5px;
      border: 1px solid #f3f4f6;
    }
    .plan-title {
      font-weight: 600;
      color: #374151;
    }
    .plan-memo {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }
    .plan-budget {
      font-size: 0.85rem;
      color: #10b981;
      font-weight: 600;
      margin-top: 6px;
    }
    /* 下部ナビゲーション */
    .bottom-nav {
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-around;
      padding: 12px;
      background: #fff;
    }
    .nav-item {
      font-size: 0.75rem;
      color: #9ca3af;
      cursor: pointer;
      text-align: center;
    }
    .nav-item.active {
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="app-container">

    <!-- 画面1: ログイン画面 -->
    <div id="login-screen">
      <div class="brand-logo">TabiShiori</div>
      <div class="brand-subtitle">みんなでつくる、旅の計画アプリ</div>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@email.com" required value="demo@example.com">
        </div>
        <div class="input-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="••••••••" required value="password123">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">ログインしてみる</button>
      </form>
    </div>

    <!-- 画面2: メイン画面 -->
    <div id="main-screen" class="hidden">
      <header>
        <div class="group-info">
          <div class="group-name">卒業旅行in京都 ⛩️</div>
          <div class="member-count">メンバー 6人</div>
        </div>
      </header>

      <div class="main-content">
        
        <!-- ✨ 追加：予定入力フォーム -->
        <div class="form-card">
          <div class="form-row">
            <input type="text" id="new-time" placeholder="時間 (例: 16:30)" style="flex: 1;">
            <input type="text" id="new-title" placeholder="予定のタイトル" style="flex: 2;">
          </div>
          <div class="form-row">
            <input type="text" id="new-memo" placeholder="メモや詳細（場所など）">
          </div>
          <div class="form-row">
            <input type="number" id="new-budget" placeholder="予算（任意、数字のみ）">
          </div>
          <button type="button" class="btn-secondary" onclick="addPlan()">予定をタイムラインに追加</button>
        </div>

        <div class="section-title">1日目のタイムライン</div>
        
        <!-- タイムラインの親要素。ここにJSで子要素を足していく -->
        <div id="timeline-container" class="timeline">
          <div class="timeline-item">
            <div class="time">10:00</div>
            <div class="plan-card">
              <div class="plan-title">京都駅 集合</div>
              <div class="plan-memo">中央口改札の近くのコインロッカー前に集まる！</div>
            </div>
          </div>

          <div class="timeline-item">
            <div class="time">11:30</div>
            <div class="plan-card">
              <div class="plan-title">ランチ：手織り寿し</div>
              <div class="plan-memo">予約済み。各自1,500円〜2,000円くらい。</div>
              <div class="plan-budget">予算: ¥2,000 / 人</div>
            </div>
          </div>
        </div>
      </div>

      <!-- フッターメニュー -->
      <div class="bottom-nav">
        <div class="nav-item active">しおり</div>
        <div class="nav-item">行きたい候補</div>
        <div class="nav-item">割り勘</div>
      </div>
    </div>

  </div>

  <!-- --- JavaScriptの処理 --- -->
  <script>
    // ログイン切り替え処理
    function handleLogin(event) {
      event.preventDefault();
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
    }

    // ✨ 追加：新しい予定を動的に追加する処理
    function addPlan() {
      // 1. 各入力欄からユーザーが打ち込んだ文字を取得する
      const timeVal = document.getElementById('new-time').value.trim();
      const titleVal = document.getElementById('new-title').value.trim();
      const memoVal = document.getElementById('new-memo').value.trim();
      const budgetVal = document.getElementById('new-budget').value.trim();

      // 2. バリデーション（時間とタイトルが空っぽだったらエラーを出す）
      if (!timeVal || !titleVal) {
        alert('「時間」と「予定のタイトル」は必ず入力してね！');
        return;
      }

      // 3. タイムラインの親要素（div）を取得
      const container = document.getElementById('timeline-container');

      // 4. 追加したい予算のHTMLをあらかじめ作っておく（入力があった場合のみ）
      let budgetHTML = '';
      if (budgetVal) {
        // 数字を「1,000」みたいにカンマ区切りにする
        const formattedBudget = Number(budgetVal).toLocaleString();
        budgetHTML = `<div class="plan-budget">予算: ¥${formattedBudget}</div>`;
      }

      // 5. 新しいタイムライン要素（HTMLの塊）を生成する
      const newItem = document.createElement('div');
      newItem.className = 'timeline-item';
      newItem.innerHTML = `
        <div class="time">${timeVal}</div>
        <div class="plan-card">
          <div class="plan-title">${titleVal}</div>
          <div class="plan-memo">${memoVal}</div>
          ${budgetHTML}
        </div>
      `;

      // 6. 親要素の一番最後に、作った要素をガッチャンコと結合する
      container.appendChild(newItem);

      // 7. 次の入力のために、フォームの中身をきれいにリセットする
      document.getElementById('new-time').value = '';
      document.getElementById('new-title').value = '';
      document.getElementById('new-memo').value = '';
      document.getElementById('new-budget').value = '';
    }
  </script>
</body>
</html>
